<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopEase | Home</title>
    <link rel="stylesheet" href="../css/home.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">ShopEase</div>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search for categories like Grocery, Snacks, Beauty...">
    </div>
    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="#">Orders</a></li>
        <li><a href="track-order.html">Track Order</a></li>
        <li><a href="cart.html">Cart 🛒 <span id="cart-count" class="cart-badge">0</span></a></li>
        <li class="dropdown">
            <a href="#">Categories ▾</a>
            <ul class="dropdown-menu">
                <li onclick="filterCategory('Grocery')">Grocery</li>
                <li onclick="filterCategory('Snacks')">Snacks</li>
                <li onclick="filterCategory('Beauty')">Beauty</li>
                <li onclick="filterCategory('Household')">Household</li>
                <li onclick="filterCategory('Electronics')">Electronics</li>
            </ul>
        </li>
    </ul>
</nav>

<section class="home">

<!-- ================= GROCERY ================= -->
<div class="category-section" id="Grocery">
    <h2>Grocery Essentials</h2>
    <div class="products"></div>
</div>

<!-- ================= SNACKS ================= -->
<div class="category-section" id="Snacks">
    <h2>Delicious Snacks</h2>
    <div class="products"></div>
</div>

<!-- ================= BEAUTY ================= -->
<div class="category-section" id="Beauty">
    <h2>Beauty & Skincare</h2>
    <div class="products"></div>
</div>

<!-- ================= HOUSEHOLD ================= -->
<div class="category-section" id="Household">
    <h2>Household Essentials</h2>
    <div class="products"></div>
</div>

<!-- ================= ELECTRONICS ================= -->
<div class="category-section" id="Electronics">
    <h2>Latest Electronics</h2>
    <div class="products"></div>
</div>

</section>
<!-- CHATBOT BUTTON -->
<div id="chat-toggle">
<i class="fas fa-robot"></i>
</div>

<!-- CHATBOT WINDOW -->
<div id="chatbot">

    <div id="chat-header">
        AI Assistant 🤖
        <span id="close-chat">✖</span>
    </div>

    <div id="chat-messages"></div>

    <input type="text" id="chat-input" placeholder="Ask something...">

</div>


<script src="../js/home.js"></script>


</body>
</html>
